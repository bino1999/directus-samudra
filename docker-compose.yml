version: "3.8"

services:
  database:
    image: postgres:15
    container_name: directus_db_samudra
    restart: unless-stopped
    environment:
      POSTGRES_DB: directus
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: directus_password
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U directus"]
      interval: 10s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:latest
    container_name: directus_app
    restart: unless-stopped
    ports:
      - "8055:8055"
    depends_on:
      database:
        condition: service_healthy
    environment:
      SECRET: "change-this-to-something-long-and-random-123!"

      DB_CLIENT: "pg"
      DB_HOST: "database"
      DB_PORT: "5432"
      DB_DATABASE: "directus"
      DB_USER: "directus"
      DB_PASSWORD: "directus_password"

      ADMIN_EMAIL: "admin@example.com"
      ADMIN_PASSWORD: "admin_password"

      PUBLIC_URL: "https://YOUR-RAILWAY-URL.railway.app"  # ← update after deploy
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions

volumes:
  db_data:
  directus_uploads:
  directus_extensions: